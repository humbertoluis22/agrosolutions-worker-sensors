---
# NetworkPolicy: Controle de tráfego de rede
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: workers-network-policy
  namespace: agrosolutions-workers
spec:
  podSelector:
    matchLabels:
      app: worker-generator
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Permite health checks e métricas
  - from:
    - namespaceSelector:
        matchLabels:
          app: agrosolutions-observability
    ports:
    - protocol: TCP
      port: 8080
  
  egress:
  # Permite acesso ao PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres-db
    ports:
    - protocol: TCP
      port: 5432
  
  # Permite acesso à Ingestion API
  - to:
    - namespaceSelector:
        matchLabels:
          app: agrosolutions-ingestion
    ports:
    - protocol: TCP
      port: 80
  
  # Permite acesso a AWS SQS (Worker Host)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
  
  # Permite DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53

---
# PodDisruptionBudget para Worker Generator
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: worker-generator-pdb
  namespace: agrosolutions-workers
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: worker-generator

---
# PodDisruptionBudget para PostgreSQL
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-db-pdb
  namespace: agrosolutions-workers
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: postgres-db

---
# ResourceQuota: Limita recursos do namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: workers-quota
  namespace: agrosolutions-workers
spec:
  hard:
    requests.cpu: "6"
    requests.memory: "12Gi"
    limits.cpu: "12"
    limits.memory: "24Gi"
    pods: "30"
    persistentvolumeclaims: "5"

---
# LimitRange: Define limites padrão para pods
apiVersion: v1
kind: LimitRange
metadata:
  name: workers-limit-range
  namespace: agrosolutions-workers
spec:
  limits:
  - max:
      cpu: "2"
      memory: "2Gi"
    min:
      cpu: "50m"
      memory: "32Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "200m"
      memory: "256Mi"
    type: Container
  
  - max:
      cpu: "4"
      memory: "4Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    type: Pod
