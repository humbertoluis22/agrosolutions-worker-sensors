---
# Note: Com IRSA (IAM Roles for Service Accounts), credenciais AWS não precisam
# ser armazenadas como K8s Secrets. O ServiceAccount 'agrosolutions-workers-sa'
# assume automaticamente a role via OIDC/EKS.
#
# Secrets necessários:
# - database-secrets: postgres-user, postgres-password, connection-string
#   (criados via GitHub Actions no deploy - nunca commitar valores reais)
#
# Para criar manualmente:
# kubectl create secret generic database-secrets \
#   --from-literal=postgres-password='YOUR_PASSWORD' \
#   --from-literal=connection-string='Host=postgres-db;Port=5432;Database=agrosolutions_raw;Username=postgres;Password=YOUR_PASSWORD' \
#   -n agrosolutions-workers
