---
# AWS Secrets for Workers
apiVersion: v1
kind: Secret
metadata:
  name: workers-aws-secrets
  namespace: agrosolutions-workers
type: Opaque
data:
  # Base64 encoded credentials
  # Use: echo -n 'your-key' | base64
  AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID_B64}"
  AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY_B64}"
