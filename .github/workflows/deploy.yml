name: AgroSolutions Workers - CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ECR_REPOSITORY: agrosolutions-worker
  EKS_CLUSTER_NAME: agrosolutions-eks-cluster
  AWS_REGION: sa-east-1

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - run: dotnet restore Agrosolutions.Worker.Sensors.slnx
      - run: dotnet build Agrosolutions.Worker.Sensors.slnx -c Release --no-restore
      - run: dotnet test Agrosolutions.Worker.Sensors.slnx -c Release --no-build --verbosity normal

  deploy-to-eks:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

          sed -i "s|agrosolutions-worker:latest|agrosolutions-worker:$IMAGE_TAG|g" k8s/production/deployments.yaml

          kubectl apply -f k8s/production/namespace.yaml
          kubectl apply -f k8s/production/infrastructure.yaml
          kubectl apply -f k8s/production/configmaps.yaml
          PVC_PHASE=$(kubectl get pvc postgres-pvc -n agrosolutions-workers -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")
          if [[ "$PVC_PHASE" == "Pending" || "$PVC_PHASE" == "NotFound" ]]; then
            echo "PVC em estado $PVC_PHASE, recriando..."
            kubectl delete pvc postgres-pvc -n agrosolutions-workers --ignore-not-found=true
          fi
          kubectl apply -f k8s/production/postgres.yaml
          kubectl rollout status deployment/postgres-db -n agrosolutions-workers --timeout=180s
          kubectl apply -f k8s/production/services.yaml
          kubectl apply -f k8s/production/deployments.yaml
          kubectl apply -f k8s/production/hpa.yaml
          kubectl apply -f k8s/production/resource-configs.yaml
          kubectl apply -f k8s/production/observability.yaml || echo "⚠️ Observability ignorado: Prometheus Operator CRDs não encontrados"

          kubectl rollout status deployment/worker-host -n agrosolutions-workers --timeout=300s
          kubectl rollout status deployment/worker-generator -n agrosolutions-workers --timeout=300s

      - name: Deployment summary
        if: always()
        run: |
          kubectl get pods -n agrosolutions-workers || true
