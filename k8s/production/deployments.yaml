---
# Worker Host (Registration) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-host
  namespace: agrosolutions-workers
  labels:
    app: worker-host
    component: registration
spec:
  replicas: 1  # SQS consumer - geralmente 1 réplica para evitar duplicação
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: worker-host
  template:
    metadata:
      labels:
        app: worker-host
        component: registration
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: agrosolutions-workers-sa  # IRSA - IAM Role for Service Accounts
      terminationGracePeriodSeconds: 60  # Tempo para finalizar processamento de mensagens
      
      # InitContainer para esperar PostgreSQL
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        command:
          - /bin/sh
          - -c
          - |
            until pg_isready -h postgres-db -p 5432 -U postgres; do
              echo "Waiting for PostgreSQL..."
              sleep 2
            done
            echo "PostgreSQL is ready!"
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      
      containers:
      - name: worker-host
        image: 316295889438.dkr.ecr.sa-east-1.amazonaws.com/agrosolutions-worker:latest
        imagePullPolicy: Always
        
        # Environment from ConfigMaps
        envFrom:
        - configMapRef:
            name: workers-common-config
        - configMapRef:
            name: worker-host-config
        
        # Resource Management
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        
        # Liveness Probe - verifica se o processo está responsivo
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "pgrep -f AgrosolutionsWorkerSensors.Registration.dll || exit 1"
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Security Context
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL

---
# Worker Generator Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-generator
  namespace: agrosolutions-workers
  labels:
    app: worker-generator
    component: data-generation
spec:
  replicas: 2  # Pode escalar para distribuir carga de geração
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: worker-generator
  template:
    metadata:
      labels:
        app: worker-generator
        component: data-generation
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: agrosolutions-workers-sa  # IRSA - IAM Role for Service Accounts
      terminationGracePeriodSeconds: 30
      
      containers:
      - name: worker-generator
        image: 316295889438.dkr.ecr.sa-east-1.amazonaws.com/agrosolutions-worker:latest
        imagePullPolicy: Always
        
        # Override entrypoint para rodar o Generator
        command: ["dotnet", "generator/AgrosolutionsWorkerSensors.Generator.dll"]
        
        # Environment from ConfigMaps
        envFrom:
        - configMapRef:
            name: workers-common-config
        - configMapRef:
            name: worker-generator-config
        
        # Resource Management
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        
        # Liveness Probe
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "pgrep -f AgrosolutionsWorkerSensors.Generator.dll || exit 1"
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Security Context
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
