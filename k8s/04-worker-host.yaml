apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-host
  namespace: agrosolutions
  labels:
    app: worker-host
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-host
  template:
    metadata:
      labels:
        app: worker-host
    spec:
      # InitContainer para esperar o banco (só o Host roda migrations)
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        command:
          - /bin/sh
          - -c
          - |
            until pg_isready -h postgres-db -p 5432 -U postgres; do
              echo "Waiting for PostgreSQL..."
              sleep 2
            done
            echo "PostgreSQL is ready!"
      containers:
      - name: worker-host
        image: agrosolutions-worker:latest
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: worker-common-config
        # Injetando as credenciais da AWS como variáveis de ambiente
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-secrets
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-secrets
              key: AWS_SECRET_ACCESS_KEY