name: AgroSolutions Workers - CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  ECR_REPOSITORY: agrosolutions-worker
  EKS_CLUSTER_NAME: agrosolutions-eks-cluster
  AWS_REGION: sa-east-1
  DOTNET_VERSION: "10.0.x"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Agrosolutions.Worker.Sensors.slnx

      - name: Build solution
        run: dotnet build Agrosolutions.Worker.Sensors.slnx -c Release --no-restore

      - name: Run tests
        run: dotnet test Agrosolutions.Worker.Sensors.slnx --configuration Release --no-build --verbosity normal

  deploy-to-eks:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write   # Required for OIDC
      contents: read    # Required to checkout code
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHubActions-WorkersDeploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS connection
        run: |
          echo "Verificando credenciais AWS..."
          aws sts get-caller-identity
          echo "Verificando cluster EKS..."
          aws eks describe-cluster --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
          VERSION: "1.0.0"
        run: |
          echo "Building Docker image..."
          docker build \
            --build-arg BUILD_DATE=$BUILD_DATE \
            --build-arg VERSION=$VERSION \
            --build-arg REVISION=${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

          echo "Pushing to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "✅ Image pushed successfully: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Configure Kubectl for EKS
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          kubectl version --client

      - name: Verify EKS connection
        run: |
          echo "Verificando conectividade com EKS..."
          kubectl cluster-info
          kubectl get nodes
          echo "Namespaces existentes:"
          kubectl get namespaces

      - name: Deploy to EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Imagem a ser deployada: ${{ steps.build-image.outputs.image }}"

          # Substituir placeholder da imagem nos deployments
          sed -i "s|316295889438.dkr.ecr.sa-east-1.amazonaws.com/agrosolutions-worker:latest|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" k8s/production/deployments.yaml

          echo "Verificando substituição da imagem:"
          grep "image:" k8s/production/deployments.yaml | head -5

          # Aplicar manifestos na ordem correta
          echo "📦 Aplicando namespace..."
          kubectl apply -f k8s/production/namespace.yaml

          echo "🔐 Aplicando ServiceAccount (IRSA)..."
          kubectl apply -f k8s/production/infrastructure.yaml

          echo "⚙️ Aplicando ConfigMaps..."
          kubectl apply -f k8s/production/configmaps.yaml

          echo "🗄️ Aplicando PostgreSQL..."
          kubectl apply -f k8s/production/postgres.yaml

          echo "🌐 Aplicando Services..."
          kubectl apply -f k8s/production/services.yaml

          echo "🚀 Aplicando Deployments..."
          kubectl apply -f k8s/production/deployments.yaml

          echo "📈 Aplicando HPA..."
          kubectl apply -f k8s/production/hpa.yaml

          echo "🔒 Aplicando Resource Configs..."
          kubectl apply -f k8s/production/resource-configs.yaml

          echo "📊 Aplicando Observability (requer Prometheus Operator)..."
          kubectl apply -f k8s/production/observability.yaml || echo "⚠️ Observability ignorado: Prometheus Operator CRDs não encontrados no cluster"

          echo "✅ Manifests aplicados com sucesso"

      - name: Wait for PostgreSQL to be ready
        run: |
          echo "Waiting for PostgreSQL deployment..."
          kubectl wait --for=condition=available --timeout=300s \
            deployment/postgres-db -n agrosolutions-workers
          echo "PostgreSQL is ready"

      - name: Wait for Worker Host rollout
        run: |
          echo "Waiting for Worker Host deployment..."
          kubectl rollout status deployment/worker-host \
            -n agrosolutions-workers \
            --timeout=600s
          echo "Worker Host deployed successfully"

      - name: Wait for Worker Generator rollout
        run: |
          echo "Waiting for Worker Generator deployment..."
          kubectl rollout status deployment/worker-generator \
            -n agrosolutions-workers \
            --timeout=600s
          echo "Worker Generator deployed successfully"

      - name: Verify deployment
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployments -n agrosolutions-workers

          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n agrosolutions-workers

          echo ""
          echo "=== Service Status ==="
          kubectl get services -n agrosolutions-workers

          echo ""
          echo "=== HPA Status ==="
          kubectl get hpa -n agrosolutions-workers

      - name: Check for deployment errors
        run: |
          echo "Checking for pod errors..."
          NOT_RUNNING=$(kubectl get pods -n agrosolutions-workers \
            --field-selector=status.phase!=Running \
            --no-headers 2>/dev/null | wc -l)

          if [ "$NOT_RUNNING" -gt 0 ]; then
            echo "WARNING: $NOT_RUNNING pods are not in Running state"
            kubectl get pods -n agrosolutions-workers \
              --field-selector=status.phase!=Running

            for pod in $(kubectl get pods -n agrosolutions-workers \
              --field-selector=status.phase!=Running \
              -o jsonpath='{.items[*].metadata.name}'); do
              echo ""
              echo "=== Logs for $pod ==="
              kubectl logs $pod -n agrosolutions-workers --tail=50 || true
              echo ""
              echo "=== Describe $pod ==="
              kubectl describe pod $pod -n agrosolutions-workers || true
            done
          else
            echo "All pods are running successfully!"
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "=== Deployment Summary ==="
          echo "Namespace: agrosolutions-workers"
          echo "Image: ${{ steps.build-image.outputs.image }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo ""
          kubectl get all -n agrosolutions-workers


